name: Convert List-KR classic (uBO) for generic adblockers

on:
  schedule:
    - cron: '0 */6 * * *'   # 6시간마다
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch & convert
        run: |
          SRC="https://cdn.jsdelivr.net/npm/@list-kr/filterslists@latest/dist/filterslist-uBlockOrigin-classic.txt"
          {
            echo "[Adblock Plus 2.0]"
            echo "! Title: List-KR classic (converted / generic)"
            echo "! Description: !#if guard removed so non-uBO/AdGuard engines load the rules"
            echo "! Updated: $(date -u)"
          } > listkr-classic-generic.txt
          curl -fsSL "$SRC" \
            | sed 's/\r$//' \
            | grep -v '^!#if' \
            | grep -v '^!#endif' \
            | grep -v '^!#include' \
            | grep -v '^! Title:' \
            | grep -v '^! Description:' \
            | grep -v '^! Version:' \
            | grep -v '^! Expires:' \
            | grep -v '^! Homepage:' \
            | grep -v '^! Licence:' \
            >> listkr-classic-generic.txt
          echo "lines: $(wc -l < listkr-classic-generic.txt)"

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add listkr-classic-generic.txt
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Update converted List-KR classic list"
            git push
          fi
