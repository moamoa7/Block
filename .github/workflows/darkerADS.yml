name: Extract darkerADS 도메인 추출

on:
  workflow_dispatch:        # 수동 실행 버튼
  schedule:
    - cron: '0 */12 * * *'  # 12시간마다

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and extract ||domain^ rules
        run: |
          curl -sL https://raw.githubusercontent.com/execute-darker/darkerADS/main/data/rules/adblock.txt -o adblock.txt

          # ||로 시작, ^로 끝나고, 중간에 경로(/)나 옵션($)이 없는 줄만 추출
          # 앞뒤의 || 와 ^ 를 떼어내 순수 도메인만 남김
          grep -E '^\|\|[^/$]+\^$' adblock.txt \
            | sed -E 's/^\|\|(.*)\^$/\1/' \
            | sort -u > domains.txt

          echo "추출 완료: $(wc -l < domains.txt) 개"
          rm -f adblock.txt

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add domains.txt
          if git diff --staged --quiet; then
            echo "변경 사항 없음"
          else
            git commit -m "Update darkerADS_Block.txt ($(date -u '+%Y-%m-%d %H:%M'))"
            git push
          fi
