name: Extract darkerADS 도메인 추출

on:
  workflow_dispatch:        # 수동 실행 버튼
  schedule:
    - cron: '0 */12 * * *'  # 12시간마다

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and extract ||domain^ rules
        run: |
          SOURCE="https://raw.githubusercontent.com/execute-darker/darkerADS/main/data/rules/adblock.txt"
          curl -sL "$SOURCE" -o adblock.txt

          # ||로 시작, ^로 끝나고, 중간에 경로(/)나 옵션($)이 없는 줄만 추출 (||...^ 형식 그대로 유지)
          grep -E '^\|\|[^/$]+\^$' adblock.txt | sort -u > body.txt

          COUNT=$(wc -l < body.txt)
          DATE=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

          {
            echo "! Title: darkerADS domain blocklist"
            echo "! Description: ||domain^ 형식 규칙만 추출한 블록리스트"
            echo "! Source: $SOURCE"
            echo "! Homepage: https://github.com/execute-darker/darkerADS"
            echo "! Generated: $DATE"
            echo "! Count: $COUNT"
            echo "!"
            cat body.txt
          } > blocklist.txt

          echo "추출 완료: $COUNT 개"
          rm -f adblock.txt body.txt

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add darkerADS_block.txt
          if git diff --staged --quiet; then
            echo "변경 사항 없음"
          else
            git commit -m "Update darkerADS_block.txt ($(date -u '+%Y-%m-%d %H:%M'))"
            git push
          fi
