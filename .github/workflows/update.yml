name: Update Filters (FULL + LITE)
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:                         # ← 이거 추가
  group: filter-update               # ← 같은 그룹명
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python combined_full.py
        continue-on-error: true
      - run: python combined_lite.py
        continue-on-error: true
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add combined_pc_full.txt combined_mobile_full.txt filter_status_full.md combined_pc_lite.txt combined_mobile_lite.txt filter_status_lite.md
          git diff --staged --quiet || git commit -m "Update filters $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
