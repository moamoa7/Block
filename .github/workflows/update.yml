name: Update Filters

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true    # Node.js 경고 해결

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write                          # push 권한 부여 (exit code 2 해결)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - run: python combined.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add combined_filters.txt
          git diff --staged --quiet || git commit -m "Update filters $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
