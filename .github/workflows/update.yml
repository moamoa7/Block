name: Update Filters

on:
  schedule:
    - cron: '0 */6 * * *'   # 6시간마다 실행
  workflow_dispatch:          # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - run: python merge_filters.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add combined_filters.txt
          git diff --staged --quiet || git commit -m "Update filters $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
