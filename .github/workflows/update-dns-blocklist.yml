name: Update DNS Blocklist

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run DNS extraction script
        run: python extract_dns.py

      - name: Check output exists
        run: |
          ERROR=0
          for FILE in output/Block_DNS.txt output/Block_Domains.txt output/Block_Hosts.txt; do
            if [ ! -f "$FILE" ]; then
              echo "::error::${FILE} not generated!"
              ERROR=1
            fi
          done
          if [ "$ERROR" -eq 1 ]; then
            exit 1
          fi
          DOMAIN_COUNT=$(grep -c -v '^#' output/Block_Domains.txt || true)
          echo "Extracted ${DOMAIN_COUNT} domains"
          if [ "$DOMAIN_COUNT" -lt 100 ]; then
            echo "::error::Too few domains (${DOMAIN_COUNT}), something may be wrong"
            exit 1
          fi

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            DOMAIN_COUNT=$(grep -c -v '^#' output/Block_Domains.txt || true)
            git commit -m "chore: update DNS blocklist $(date -u +%Y-%m-%d) [${DOMAIN_COUNT} domains]"
            git push
          fi
