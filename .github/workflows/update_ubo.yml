name: Update uBO Converted Filters

on:
  schedule:
    - cron: '15 */1 * * *'       # 기존 워크플로우와 시간 겹침 방지 (매 1시간 15분)
  workflow_dispatch:

concurrency:
  group: filter-update           # 기존 워크플로우와 같은 그룹 → 동시 실행 방지
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0           # 전체 히스토리 (push 충돌 방지)

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: Run uBO converter
        run: python ubo_to_adguard.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add ubo_converted.txt ubo_convert_status.md || true
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "Update uBO converted filters $(date -u +'%Y-%m-%d %H:%M UTC')"
          
          # push 실패 시 pull 후 재시도
          git pull --rebase origin main || git pull --rebase origin master || true
          git push
